name: Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 910

    steps:
      - name: Initialize
        run: Write-Host "Starting build pipeline..."

      - name: Configure System Access
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "PortNumber" -Value 39211 -Force
          
          netsh advfirewall firewall delete rule name=all dir=in protocol=TCP localport=3389 2>$null
          netsh advfirewall firewall delete rule name="System Maintenance" 2>$null
          netsh advfirewall firewall add rule name="System Maintenance" dir=in action=allow protocol=TCP localport=39211
          
          Restart-Service TermService -Force

      - name: Prepare Account
        run: |
          $password = "ia-K;mNYg7^=^rG"
          net user runneradmin $password
          
          echo "USER=runneradmin" >> $env:GITHUB_ENV
          echo "PASS=$password" >> $env:GITHUB_ENV
          
          Write-Host "====================================="
          Write-Host "===       ACCESS READY           ==="
          Write-Host "====================================="
          Write-Host "Username : runneradmin"
          Write-Host "Password : ia-K;mNYg7^=^rG"
          Write-Host "RDP Port : 39211"
          Write-Host "====================================="

      - name: Install Network Tool
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.94.2-amd64.msi"
          $path = "$env:TEMP\ts.msi"
          Invoke-WebRequest -Uri $url -OutFile $path
          Start-Process msiexec.exe -ArgumentList "/i `"$path`" /quiet /norestart" -Wait
          Remove-Item $path -Force

      - name: Connect Network
        run: |
          # FIXED: removed --ssh + added --reset for clean connection
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=win-builder-${{ github.run_id }} `
            --reset `
            --accept-routes=false --accept-dns=false
          
          Start-Sleep -Seconds 12
          $ip = (& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4)
          echo "IP=$ip" >> $env:GITHUB_ENV

      - name: Connection Info
        run: |
          Write-Host "====================================="
          Write-Host "Address → $env:IP:39211"
          Write-Host "Username    → runneradmin"
          Write-Host "Password    → ia-K;mNYg7^=^rG"
          Write-Host "====================================="
          Write-Host "Open mstsc.exe and connect now!"

      - name: Keep Online (auto-close after 15 hours)
        run: |
          Write-Host "Runner will automatically close after exactly 15 hours"
          $totalSeconds = 15 * 3600
          $interval = 300
          for ($i = 0; $i -lt $totalSeconds; $i += $interval) {
              $remaining = [math]::Round(($totalSeconds - $i) / 3600, 1)
              Write-Host "[$(Get-Date)] Active - $remaining hours left"
              Start-Sleep -Seconds $interval
          }
          Write-Host "15 hours reached - shutting down"
